events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone (10 requests per second maximum per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost;

        # 1. Routing to Frontend Microservice
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. Reverse Proxy to Hardened Assembly API
        location /api/asm/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass http://api-assembly:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Reverse Proxy to C++ API
        location /api/cpp/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass http://api-cpp:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Reverse Proxy to TypeScript/Bun API
        location /api/ts/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass http://api-ts:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. Reverse Proxy to Rust API
        location /api/rust/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass http://api-rust:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
