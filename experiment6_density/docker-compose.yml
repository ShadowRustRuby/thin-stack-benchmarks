services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-assembly
      - api-cpp
      - api-ts
      - api-rust

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

  api-assembly:
    build:
      context: ./backend_asm
      dockerfile: Dockerfile
    ports:
      - "8081:8080"

  api-cpp:
    build:
      context: ./backend_cpp
      dockerfile: Dockerfile
    ports:
      - "8082:8080"

  api-ts:
    build:
      context: ./backend_ts
      dockerfile: Dockerfile
    ports:
      - "8083:8080"

  api-rust:
    build:
      context: ./backend_rust
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
